<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>濱江廠客休區座位管理系統</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Microsoft JhengHei', '微軟正黑體', Arial, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1a3c5e, #2d6a9f);
    color: white;
    padding: 14px 20px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  header h1 { font-size: 1.4rem; letter-spacing: 2px; }
  header p { font-size: 0.8rem; opacity: 0.8; margin-top: 4px; }

  .main-container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: white;
    border-radius: 10px;
    padding: 10px 18px;
    flex: 1;
    min-width: 120px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }
  .stat-card .num { font-size: 1.8rem; font-weight: 700; }
  .stat-card .label { font-size: 0.75rem; color: #666; margin-top: 2px; }
  .stat-card.total .num { color: #2d6a9f; }
  .stat-card.occupied .num { color: #e05252; }
  .stat-card.empty .num { color: #3aaa5c; }

  /* Zone card */
  .zone-card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    overflow: hidden;
  }
  .zone-header {
    padding: 10px 16px;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .zone-body {
    padding: 16px;
  }

  /* Yellow zone */
  .zone-yellow .zone-header { background: #ffd600; color: #5a3e00; }
  /* Blue zone */
  .zone-blue .zone-header { background: #4a90d9; color: white; }
  /* Green zone */
  .zone-green .zone-header { background: #5aad6e; color: white; }

  /* Seat grids */
  .seats-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: flex-start;
  }
  .seats-grid.blue-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .seats-grid.yellow-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .seats-grid.green-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }

  /* Seat button — circle */
  .seat {
    position: relative;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }
  .seat:hover { transform: scale(1.07); box-shadow: 0 4px 14px rgba(0,0,0,0.2); }
  .seat:active { transform: scale(0.96); }

  .seat.circle {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    font-size: 0.85rem;
  }
  .seat.square {
    width: 100%;
    height: 56px;
    border-radius: 8px;
    font-size: 0.8rem;
  }

  /* Empty state */
  .seat.empty.circle  { background: #e8f5e9; border: 2px solid #81c784; color: #2e7d32; }
  .seat.empty.square  { background: #e8f5e9; border: 2px solid #81c784; color: #2e7d32; }

  /* Occupied state */
  .seat.occupied {
    background: linear-gradient(135deg, #ff6b6b, #e03a3a);
    border: 2px solid #c0392b;
    color: white;
  }
  .seat.occupied .seat-id { font-size: 0.65rem; opacity: 0.85; }
  .seat.occupied .plate { font-size: 0.8rem; font-weight: 800; letter-spacing: 1px; }

  /* Modal overlay */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: white;
    border-radius: 16px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    overflow: hidden;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h2 { font-size: 1.1rem; }
  .modal-header .seat-badge {
    background: #1a3c5e;
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.9rem;
    font-weight: 700;
  }

  .modal-body { padding: 16px 20px; }

  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 0.85rem;
    color: #555;
    margin-bottom: 5px;
    font-weight: 600;
  }
  .form-group input,
  .form-group textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid #d0d5dd;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: inherit;
    transition: border-color 0.2s;
    resize: vertical;
  }
  .form-group input:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: #2d6a9f;
    box-shadow: 0 0 0 3px rgba(45,106,159,0.15);
  }
  .required-star { color: #e03a3a; }

  /* Info display (occupied view) */
  .info-row {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 8px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .info-row:last-child { border-bottom: none; }
  .info-label {
    font-size: 0.8rem;
    color: #888;
    min-width: 80px;
    padding-top: 1px;
  }
  .info-value {
    font-size: 0.95rem;
    font-weight: 600;
    color: #222;
    flex: 1;
    word-break: break-all;
  }
  .plate-display {
    font-size: 1.3rem;
    font-weight: 800;
    color: #1a3c5e;
    letter-spacing: 2px;
  }
  .time-display { font-size: 0.8rem; color: #aaa; }

  .modal-footer {
    padding: 14px 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    border-top: 1px solid #f0f0f0;
  }

  .btn {
    flex: 1;
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:hover { opacity: 0.88; }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: #2d6a9f; color: white; }
  .btn-success { background: #3aaa5c; color: white; }
  .btn-danger  { background: #e03a3a; color: white; }
  .btn-secondary { background: #eee; color: #444; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a3c5e;
    color: white;
    padding: 10px 24px;
    border-radius: 30px;
    font-size: 0.9rem;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 9999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Search bar */
  .search-bar {
    background: white;
    border-radius: 10px;
    padding: 12px 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-bar input {
    flex: 1;
    min-width: 160px;
    padding: 8px 12px;
    border: 1.5px solid #d0d5dd;
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: inherit;
  }
  .search-bar input:focus { outline: none; border-color: #2d6a9f; }
  .search-result {
    font-size: 0.85rem;
    color: #555;
    padding: 6px 0;
  }
  .search-highlight {
    background: #fff9c4;
    border: 2px solid #fbc02d !important;
    animation: pulse 0.6s ease 3;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.1); }
  }

  /* Floor plan */
  .floorplan-card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    overflow: hidden;
  }
  .floorplan-header {
    background: linear-gradient(135deg, #3d3d3d, #5a5a5a);
    color: white;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .floorplan-header span { font-weight: 700; font-size: 1rem; }
  .floorplan-body {
    padding: 12px;
    position: relative;
    background: #fafafa;
  }
  .floorplan-body img {
    width: 100%;
    max-height: 520px;
    object-fit: contain;
    border-radius: 6px;
    display: block;
  }
  .floorplan-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 48px 20px;
    color: #aaa;
    font-size: 0.95rem;
  }
  .floorplan-empty svg { opacity: 0.35; }
  .floorplan-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .btn-upload {
    background: #f0f4ff;
    border: 1.5px dashed #4a90d9;
    color: #2d6a9f;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn-upload:hover { background: #dceeff; }
  .btn-del-img {
    background: #fff0f0;
    border: 1.5px solid #e8a0a0;
    color: #c0392b;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn-del-img:hover { background: #ffe0e0; }
  #file-input { display: none; }

  /* Zoom overlay */
  .img-zoom-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 2000;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  .img-zoom-overlay.open { display: flex; }
  .img-zoom-overlay img {
    max-width: 96vw;
    max-height: 92vh;
    object-fit: contain;
    border-radius: 8px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  .zoom-close {
    position: absolute;
    top: 16px; right: 20px;
    color: white;
    font-size: 2rem;
    cursor: pointer;
    line-height: 1;
    opacity: 0.8;
  }
  .zoom-close:hover { opacity: 1; }
  .zoom-hint {
    position: absolute;
    bottom: 16px;
    color: rgba(255,255,255,0.6);
    font-size: 0.8rem;
  }
  .floorplan-body img { cursor: zoom-in; }

  /* Responsive */
  @media (max-width: 600px) {
    .seats-grid.blue-grid  { grid-template-columns: repeat(3, 1fr); }
    .seats-grid.green-grid { grid-template-columns: repeat(4, 1fr); }
    .seat.circle { width: 62px; height: 62px; }
  }
  @media (max-width: 400px) {
    .seats-grid.blue-grid  { grid-template-columns: repeat(3, 1fr); }
    .seats-grid.green-grid { grid-template-columns: repeat(3, 1fr); }
    .seat.circle { width: 56px; height: 56px; font-size: 0.75rem; }
  }
</style>
</head>
<body>

<header>
  <h1>濱江廠 · 客休區座位管理系統</h1>
  <p>點擊座位可登錄或查詢客戶資訊</p>
</header>

<div class="main-container">

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card total">
      <div class="num" id="stat-total">0</div>
      <div class="label">總座位數</div>
    </div>
    <div class="stat-card occupied">
      <div class="num" id="stat-occupied">0</div>
      <div class="label">已有客人</div>
    </div>
    <div class="stat-card empty">
      <div class="num" id="stat-empty">0</div>
      <div class="label">空位</div>
    </div>
  </div>

  <!-- Search -->
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="🔍 搜尋車牌 / 姓名 / 特徵..." oninput="doSearch()">
    <div class="search-result" id="search-result"></div>
  </div>

  <!-- Floor Plan -->
  <div class="floorplan-card">
    <div class="floorplan-header">
      <span>🗺️ 客休區配置圖</span>
      <div class="floorplan-actions">
        <button class="btn-upload" onclick="document.getElementById('file-input').click()">📁 上傳／更換圖片</button>
        <button class="btn-del-img" id="btn-del-img" style="display:none" onclick="deleteFloorplan()">🗑️ 移除圖片</button>
      </div>
    </div>
    <div class="floorplan-body" id="floorplan-body">
      <div class="floorplan-empty" id="floorplan-empty">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
        </svg>
        <span>尚未上傳配置圖，點擊右上角「上傳圖片」新增</span>
      </div>
      <img id="floorplan-img" src="" alt="客休區配置圖" style="display:none" onclick="openZoom()">
    </div>
    <input type="file" id="file-input" accept="image/*" onchange="uploadFloorplan(event)">
  </div>

  <!-- Zoom overlay -->
  <div class="img-zoom-overlay" id="zoom-overlay" onclick="closeZoom()">
    <span class="zoom-close" onclick="closeZoom()">✕</span>
    <img id="zoom-img" src="" alt="放大圖">
    <span class="zoom-hint">點擊任意處關閉</span>
  </div>

  <!-- Yellow Zone -->
  <div class="zone-card zone-yellow">
    <div class="zone-header">🟡 黃區（A區）— 圓形座位</div>
    <div class="zone-body">
      <div class="seats-grid yellow-grid" id="zone-a"></div>
    </div>
  </div>

  <!-- Blue Zone -->
  <div class="zone-card zone-blue">
    <div class="zone-header">🔵 藍區（B區）— 服專商談區</div>
    <div class="zone-body">
      <div class="seats-grid blue-grid" id="zone-b"></div>
    </div>
  </div>

  <!-- Green Zone -->
  <div class="zone-card zone-green">
    <div class="zone-header">🟢 綠區（C區）— 方形座位</div>
    <div class="zone-body">
      <div class="seats-grid green-grid" id="zone-c"></div>
    </div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOnBg(event)">
  <div class="modal" id="modal">
    <div class="modal-header" id="modal-header">
      <h2 id="modal-title">登錄客戶資訊</h2>
      <span class="seat-badge" id="modal-seat-badge">A1</span>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const SEATS = {
  A: ['A1','A2','A3','A4','A5'],
  B: ['B1','B2','B3','B4','B5','B6','B7','B8','B9','B10','B11','B12','B13','B14'],
  C: ['C1','C2','C3','C4','C5','C6','C7','C8','C9','C10']
};
const STORAGE_KEY = 'seat_manager_data';

// ─── State ────────────────────────────────────────────────────────────────────
let data = loadData();
let currentSeat = null;
let editMode = false;
let searchActive = false;

// ─── Persistence ──────────────────────────────────────────────────────────────
function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderAll() {
  renderZone('zone-a', SEATS.A, 'circle');
  renderZone('zone-b', SEATS.B, 'circle');
  renderZone('zone-c', SEATS.C, 'square');
  updateStats();
}

function renderZone(containerId, seats, shape) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  seats.forEach(id => {
    const info = data[id];
    const btn = document.createElement('button');
    btn.className = `seat ${shape} ${info ? 'occupied' : 'empty'}`;
    btn.id = `seat-${id}`;
    btn.onclick = () => handleSeatClick(id);

    if (info) {
      btn.innerHTML = `
        <span class="seat-id">${id}</span>
        <span class="plate">${info.plate}</span>
      `;
      btn.title = `${id} | ${info.plate} | ${info.name || '—'} | ${info.note || '—'}`;
    } else {
      btn.textContent = id;
      btn.title = `${id} — 空位`;
    }
    el.appendChild(btn);
  });
}

function updateStats() {
  const total = SEATS.A.length + SEATS.B.length + SEATS.C.length;
  const occupied = Object.keys(data).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-occupied').textContent = occupied;
  document.getElementById('stat-empty').textContent = total - occupied;
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function handleSeatClick(seatId) {
  currentSeat = seatId;
  editMode = false;
  const info = data[seatId];
  const overlay = document.getElementById('modal-overlay');
  const badge = document.getElementById('modal-seat-badge');
  badge.textContent = seatId;
  badge.style.background = info ? '#c0392b' : '#1a3c5e';

  if (info) {
    showInfoModal(seatId, info);
  } else {
    showCheckInModal(seatId);
  }
  overlay.classList.add('open');
}

function showCheckInModal(seatId) {
  document.getElementById('modal-title').textContent = '登錄客戶資訊';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-group">
      <label>車牌號碼 <span class="required-star">*</span></label>
      <input type="text" id="inp-plate" placeholder="例：ABC-1234" maxlength="10"
             oninput="this.value=this.value.toUpperCase()">
    </div>
    <div class="form-group">
      <label>車主姓名／稱呼</label>
      <input type="text" id="inp-name" placeholder="例：林先生" maxlength="20">
    </div>
    <div class="form-group">
      <label>外觀特徵備註</label>
      <textarea id="inp-note" rows="3" placeholder="例：穿藍色外套、戴帽子、在看筆電"></textarea>
    </div>
  `;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
    <button class="btn btn-success" onclick="doCheckIn()">✅ 確認入座</button>
  `;
  setTimeout(() => document.getElementById('inp-plate').focus(), 80);
}

function showInfoModal(seatId, info) {
  editMode = false;
  document.getElementById('modal-title').textContent = '座位客戶資訊';
  const since = info.time ? new Date(info.time).toLocaleString('zh-TW') : '—';
  document.getElementById('modal-body').innerHTML = `
    <div class="info-row">
      <span class="info-label">車牌號碼</span>
      <span class="info-value plate-display">${info.plate}</span>
    </div>
    <div class="info-row">
      <span class="info-label">車主稱呼</span>
      <span class="info-value">${info.name || '（未填寫）'}</span>
    </div>
    <div class="info-row">
      <span class="info-label">外觀特徵</span>
      <span class="info-value">${info.note || '（未填寫）'}</span>
    </div>
    <div class="info-row">
      <span class="info-label">入座時間</span>
      <span class="info-value time-display">${since}</span>
    </div>
  `;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="closeModal()">關閉</button>
    <button class="btn btn-primary" onclick="showEditModal('${seatId}')">✏️ 修改資料</button>
    <button class="btn btn-danger" onclick="doCheckOut('${seatId}')">🚗 結案離座</button>
  `;
}

function showEditModal(seatId) {
  const info = data[seatId];
  editMode = true;
  document.getElementById('modal-title').textContent = '修改客戶資訊';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-group">
      <label>車牌號碼 <span class="required-star">*</span></label>
      <input type="text" id="inp-plate" value="${info.plate}" maxlength="10"
             oninput="this.value=this.value.toUpperCase()">
    </div>
    <div class="form-group">
      <label>車主姓名／稱呼</label>
      <input type="text" id="inp-name" value="${info.name || ''}" maxlength="20">
    </div>
    <div class="form-group">
      <label>外觀特徵備註</label>
      <textarea id="inp-note" rows="3">${info.note || ''}</textarea>
    </div>
  `;
  document.getElementById('modal-footer').innerHTML = `
    <button class="btn btn-secondary" onclick="showInfoModal('${seatId}', data['${seatId}'])">返回</button>
    <button class="btn btn-primary" onclick="doUpdate('${seatId}')">💾 儲存修改</button>
  `;
}

function doCheckIn() {
  const plate = document.getElementById('inp-plate').value.trim();
  if (!plate) { showToast('⚠️ 請填寫車牌號碼'); return; }
  data[currentSeat] = {
    plate,
    name: document.getElementById('inp-name').value.trim(),
    note: document.getElementById('inp-note').value.trim(),
    time: Date.now()
  };
  saveData();
  renderAll();
  closeModal();
  showToast(`✅ ${currentSeat} 已登錄 ${plate}`);
}

function doUpdate(seatId) {
  const plate = document.getElementById('inp-plate').value.trim();
  if (!plate) { showToast('⚠️ 請填寫車牌號碼'); return; }
  data[seatId] = {
    ...data[seatId],
    plate,
    name: document.getElementById('inp-name').value.trim(),
    note: document.getElementById('inp-note').value.trim(),
  };
  saveData();
  renderAll();
  closeModal();
  showToast(`💾 ${seatId} 資料已更新`);
}

function doCheckOut(seatId) {
  const plate = data[seatId]?.plate || '';
  if (!confirm(`確定要讓 ${seatId}（${plate}）結案離座？`)) return;
  delete data[seatId];
  saveData();
  renderAll();
  closeModal();
  showToast(`🚗 ${seatId} ${plate} 已結案離座`);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  currentSeat = null;
  editMode = false;
  clearSearch();
}

function closeModalOnBg(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ─── Search ───────────────────────────────────────────────────────────────────
function doSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const resultEl = document.getElementById('search-result');
  // Clear highlight
  document.querySelectorAll('.seat.search-highlight').forEach(el => el.classList.remove('search-highlight'));

  if (!q) { resultEl.textContent = ''; return; }

  const matches = [];
  Object.entries(data).forEach(([seatId, info]) => {
    if (
      info.plate.toLowerCase().includes(q) ||
      (info.name && info.name.toLowerCase().includes(q)) ||
      (info.note && info.note.toLowerCase().includes(q))
    ) {
      matches.push(seatId);
    }
  });

  matches.forEach(id => {
    const el = document.getElementById(`seat-${id}`);
    if (el) el.classList.add('search-highlight');
  });

  if (matches.length === 0) {
    resultEl.textContent = '查無符合結果';
  } else {
    resultEl.textContent = `找到 ${matches.length} 個座位：${matches.join('、')}`;
    // Auto-scroll to first match
    const first = document.getElementById(`seat-${matches[0]}`);
    if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-result').textContent = '';
  document.querySelectorAll('.seat.search-highlight').forEach(el => el.classList.remove('search-highlight'));
}

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

// ─── Keyboard ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modal-overlay').classList.contains('open')) {
    if (!editMode && !data[currentSeat]) doCheckIn();
    else if (editMode) doUpdate(currentSeat);
  }
});

// ─── Floor Plan Image ─────────────────────────────────────────────────────────
const FLOORPLAN_KEY = 'seat_manager_floorplan';

function uploadFloorplan(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 8 * 1024 * 1024) { showToast('⚠️ 圖片太大，請選擇 8MB 以內的檔案'); return; }
  const reader = new FileReader();
  reader.onload = (e) => {
    const base64 = e.target.result;
    localStorage.setItem(FLOORPLAN_KEY, base64);
    showFloorplan(base64);
    showToast('✅ 配置圖已更新');
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function showFloorplan(base64) {
  const img = document.getElementById('floorplan-img');
  const empty = document.getElementById('floorplan-empty');
  const delBtn = document.getElementById('btn-del-img');
  const zoomImg = document.getElementById('zoom-img');
  img.src = base64;
  zoomImg.src = base64;
  img.style.display = 'block';
  empty.style.display = 'none';
  delBtn.style.display = 'inline-flex';
}

function deleteFloorplan() {
  if (!confirm('確定要移除配置圖？')) return;
  localStorage.removeItem(FLOORPLAN_KEY);
  const img = document.getElementById('floorplan-img');
  const empty = document.getElementById('floorplan-empty');
  const delBtn = document.getElementById('btn-del-img');
  img.src = '';
  img.style.display = 'none';
  empty.style.display = 'flex';
  delBtn.style.display = 'none';
  showToast('🗑️ 配置圖已移除');
}

function openZoom() {
  document.getElementById('zoom-overlay').classList.add('open');
}
function closeZoom() {
  document.getElementById('zoom-overlay').classList.remove('open');
}

function loadFloorplan() {
  const saved = localStorage.getItem(FLOORPLAN_KEY);
  if (saved) showFloorplan(saved);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderAll();
loadFloorplan();
</script>
</body>
</html>
